name: Scheduled Flaky Test Report

on:
  schedule:
    - cron: "0 6 * * 1"   # Every Monday at 6 AM UTC
  workflow_dispatch:        # Allow manual trigger

jobs:
  detect-and-report:
    name: Weekly Flaky Test Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run flaky detection (5 iterations)
        env:
          PYTHONPATH: src/main
        run: |
          python -c "
          import json, sys
          from flaky_detector import FlakyDetector
          from test_analyzer import TestAnalyzer

          detector = FlakyDetector(test_path='src/test/sample_tests.py', runs=5)
          results = detector.run()
          TestAnalyzer().batch_suggest(results)

          with open('flaky-report.json', 'w') as f:
              json.dump(results, f, indent=2)

          flaky = [r for r in results if r['is_flaky']]
          stable = len(results) - len(flaky)
          print(f'=== Flaky Test Report ===')
          print(f'Total: {len(results)} | Flaky: {len(flaky)} | Stable: {stable}')
          print()
          for t in flaky:
              print(f'  FLAKY: {t[\"test_name\"]} ({t[\"failure_rate\"]*100:.0f}%)')
              if t.get('suggested_fix'):
                  print(f'         Fix: {t[\"suggested_fix\"][:100]}')
          "

      - name: Upload flaky report
        uses: actions/upload-artifact@v4
        with:
          name: flaky-report
          path: flaky-report.json
          retention-days: 30

      - name: Create issue if flaky tests found
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('flaky-report.json', 'utf8'));
            const flaky = report.filter(t => t.is_flaky);

            if (flaky.length === 0) {
              console.log('No flaky tests found. Skipping issue creation.');
              return;
            }

            const rows = flaky.map(t => {
              const rate = (t.failure_rate * 100).toFixed(1);
              const name = t.test_name.split('::').pop();
              return `| \`${name}\` | ${rate}% | ${(t.suggested_fix || '').slice(0, 80)} |`;
            }).join('\n');

            const body = `## Weekly Flaky Test Report

            **${flaky.length} flaky test(s)** detected out of ${report.length} total.

            | Test | Failure Rate | Suggested Fix |
            |------|-------------|---------------|
            ${rows}

            _Auto-generated by FlakyScan scheduled workflow._`;

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'flaky-tests',
              state: 'open',
            });

            if (issues.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues[0].number,
                body: body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `Flaky Tests Detected (${new Date().toISOString().slice(0, 10)})`,
                body: body,
                labels: ['flaky-tests'],
              });
            }
