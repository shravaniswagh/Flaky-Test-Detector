name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Static Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run flake8
        run: flake8 src/main/ --max-line-length=120 --exclude=__pycache__

      - name: Run pylint
        run: pylint src/main/*.py --disable=C0114,C0115,C0116 --fail-under=6.0

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests with JUnit output
        run: |
          python -m pytest src/test/sample_tests.py \
            --junitxml=test-results/junit.xml \
            -v --tb=short || true
        env:
          PYTHONPATH: src/main

      - name: Upload JUnit results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results/

      - name: Publish test report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Pytest Results
          path: test-results/junit.xml
          reporter: java-junit

  flaky-detection:
    name: Flaky Test Detection
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Detect flaky tests (3 iterations)
        id: detect
        env:
          PYTHONPATH: src/main
        run: |
          python -c "
          import sys, json
          from flaky_detector import FlakyDetector
          from test_analyzer import TestAnalyzer

          detector = FlakyDetector(test_path='src/test/sample_tests.py', runs=3)
          results = detector.run()
          TestAnalyzer().batch_suggest(results)

          flaky = [r for r in results if r['is_flaky']]
          print(json.dumps({
              'total': len(results),
              'flaky': len(flaky),
              'details': [{
                  'name': t['test_name'],
                  'failure_rate': f\"{t['failure_rate']*100:.0f}%\",
                  'suggestion': t.get('suggested_fix', '')[:80]
              } for t in flaky]
          }, indent=2))

          if flaky:
              print(f'::warning::Detected {len(flaky)} flaky test(s) out of {len(results)} total')
          else:
              print(f'All {len(results)} tests are stable.')
          "

      - name: Comment flaky results on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const body = `### Flaky Test Detection Report
            The flaky test detector ran 3 iterations on this PR's test suite.
            Check the **Flaky Test Detection** job logs for detailed results.

            _Generated by FlakyScan CI_`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

  docker-build:
    name: Docker Build & Health Check
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build \
            -f infrastructure/docker/Dockerfile \
            -t flakyscan:${{ github.sha }} \
            .

      - name: Run container health check
        run: |
          docker run -d --name flakyscan-test -p 8080:8080 \
            -e FLAKYSCAN_DB_PATH=/app/data/flakyscan.db \
            flakyscan:${{ github.sha }}
          sleep 5
          curl -f http://localhost:8080/health
          docker stop flakyscan-test
          docker rm flakyscan-test

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check for known vulnerabilities
        run: |
          pip install safety
          safety check -r requirements.txt || true

      - name: Run bandit security linter
        run: |
          pip install bandit
          bandit -r src/main/ -ll --skip B101 || true
